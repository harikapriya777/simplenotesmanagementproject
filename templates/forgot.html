<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Notes Management System</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 400px;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .tabs {
        display: flex;
        margin-bottom: 20px;
        border-radius: 8px;
        overflow: hidden;
    }

    .tab-btn {
        flex: 1;
        padding: 12px;
        border: none;
        background: #e5e7eb;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .tab-btn.active {
        background: #4f46e5;
        color: white;
    }

    .form {
        display: none;
    }

    .form.active {
        display: block;
    }

    .input-group {
        margin-bottom: 15px;
    }

    .input-group label {
        display: block;
        margin-bottom: 5px;
        color: #444;
        font-size: 14px;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #4338ca;
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        color: #666;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="container">

    <h2>Notes Management System</h2>

    <!-- <div class="tabs">
        <button class="tab-btn active" onclick="showForm('login')">Login</button>
        <button class="tab-btn" onclick="showForm('register')">Register</button>
    </div> -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
        <b style = 'color: aquamarine;'>{{message}}</b>
    {% endfor %}
    {% endif %}
    {% endwith %}


    <!-- Login Form -->
    <form id="login" class="form active" action = "{{url_for('forgotpassword')}}" method = "POST">
        <div class="input-group">
            <label>Email</label>
            <input type="email" name = "useremail" placeholder="Enter email" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    

    <!-- Register Form -->
    <!-- <form id="register" class="form" method="post" action="{{url_for('register')}}">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name = "username" placeholder="Enter full name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name = "useremail" placeholder="Enter email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name = "userpassword" placeholder="Create password" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="password" name = "userphone" placeholder="Phone pls" required>
        </div>

        <button type="submit" class="btn">Register</button>

        <p class="footer-text">
            Create an account to manage your notes.
        </p>
    </form>

</div>

        tabs[0].classList.add('active');

</body>
</html>
