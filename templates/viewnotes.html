{% extends 'dashboard.html' %}
{% block addcss %}<link rel="stylesheet" href="{{url_for('static',filename='addnotes.css')}}">{% endblock %}
{% block content %}

<div class="add-notes-container">

    <div class="form-card">

        <h2>View Notes</h2>
        <p class="subtitle">Read a Notes content.</p>

       

            <div class="form-group">
                <label for="title">Note Title</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{notesdata[1]}}"
                    readonly
                >
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea
                    id="description"
                    name="description"
                    rows="8" readonly>{{notesdata[2]}}</textarea>
            </div>

    </div>

</div>
{% endblock %}
