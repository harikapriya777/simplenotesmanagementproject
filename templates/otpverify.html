<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .otp-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        .otp-container h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .otp-container p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .otp-input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        .otp-input:focus {
            border-color: #4a90e2;
        }

        .verify-btn {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .verify-btn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>

<div class="otp-container">
    <h2>OTP Verification</h2>
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
    <b style="color: pink;">{{message}}</b>
    {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

    <form method="POST">
        <input
            type="text"
            name="otp"
            class="otp-input"
            maxlength="6"
            placeholder="Enter OTP"
            required
        >

        <button type="submit" class="verify-btn">
            Verify OTP
        </button>
    </form>
</div>

</body>
</html>
